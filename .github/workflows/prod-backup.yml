name: Production backup

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'  # every Sunday at 02:00 UTC

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download production site via rsync
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UPLOAD_SSH_KEY }}" > ~/.ssh/id_for_upload
          chmod 600 ~/.ssh/id_for_upload
          echo "${{ vars.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          mkdir -p prod-backup
          rsync -avz \
            -e "ssh -i ~/.ssh/id_for_upload" \
            "${{ vars.UPLOAD_USERNAME }}@${{ vars.UPLOAD_HOST }}:${{ vars.UPLOAD_PATH }}/" \
            prod-backup/

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-backup
          path: prod-backup/
          retention-days: 90

      - name: Update file manifest
        run: |
          find prod-backup -type f | sed 's|^prod-backup/||' | sort > _prod-manifest.txt

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _prod-manifest.txt
          git diff --staged --quiet && echo "No changes to manifest." || \
            git commit -m "Update production file manifest [skip ci]" && git push
