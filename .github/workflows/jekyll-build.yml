name: Jekyll build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Allow only one concurrent deployment per target.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: habkost-net/Gemfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.207.0
        with:
          ruby-version: '3.1' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Build with Jekyll
        run: bundle exec jekyll build --source ./habkost-net
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site/

  # Deploy to production (main branch pushes only)
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site/
      - name: Deploy via rsync (no delete)
        run: bash .github/scripts/deploy.sh
        env:
          UPLOAD_SSH_KEY: ${{ secrets.UPLOAD_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
          UPLOAD_USERNAME: ${{ vars.UPLOAD_USERNAME }}
          UPLOAD_HOST: ${{ vars.UPLOAD_HOST }}
          UPLOAD_PATH: ${{ vars.UPLOAD_PATH }}
      - name: Show files that would be deleted
        run: |
          echo '## Files that would be deleted from production' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          bash .github/scripts/deploy.sh 2>&1 | grep '^deleting ' >> "$GITHUB_STEP_SUMMARY" || echo '(none)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        env:
          UPLOAD_SSH_KEY: ${{ secrets.UPLOAD_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
          UPLOAD_USERNAME: ${{ vars.UPLOAD_USERNAME }}
          UPLOAD_HOST: ${{ vars.UPLOAD_HOST }}
          UPLOAD_PATH: ${{ vars.UPLOAD_PATH }}
          DRY_RUN: "1"
          DELETE: "1"

  # Cleanup production: delete stale files (requires manual approval via environment)
  cleanup-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy-production
    runs-on: ubuntu-latest
    environment: production-delete
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site/
      - name: Delete stale files via rsync
        run: bash .github/scripts/deploy.sh
        env:
          UPLOAD_SSH_KEY: ${{ secrets.UPLOAD_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
          UPLOAD_USERNAME: ${{ vars.UPLOAD_USERNAME }}
          UPLOAD_HOST: ${{ vars.UPLOAD_HOST }}
          UPLOAD_PATH: ${{ vars.UPLOAD_PATH }}
          DELETE: "1"

  # Deploy PR preview (one subdirectory per PR number)
  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site/
      - name: Deploy via rsync
        run: bash .github/scripts/deploy.sh
        env:
          UPLOAD_SSH_KEY: ${{ secrets.UPLOAD_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
          UPLOAD_USERNAME: ${{ vars.UPLOAD_USERNAME }}
          UPLOAD_HOST: ${{ vars.UPLOAD_HOST }}
          UPLOAD_PATH: ${{ vars.UPLOAD_PATH }}/pr-${{ github.event.pull_request.number }}
          DELETE: "1"

  # Deploy branch preview (non-main branch pushes)
  deploy-branch-preview:
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site/
      - name: Deploy via rsync
        run: |
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          export UPLOAD_PATH="${{ vars.UPLOAD_PATH }}/branch-${BRANCH}"
          bash .github/scripts/deploy.sh
        env:
          UPLOAD_SSH_KEY: ${{ secrets.UPLOAD_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
          UPLOAD_USERNAME: ${{ vars.UPLOAD_USERNAME }}
          UPLOAD_HOST: ${{ vars.UPLOAD_HOST }}
          DELETE: "1"

