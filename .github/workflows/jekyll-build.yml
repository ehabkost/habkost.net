name: Jekyll build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  PRODUCTION_DOMAIN: habkost.net
  STAGING_DOMAIN: staging.habkost.net
  PREVIEW_DOMAIN: preview.habkost.net
  PROD_BASEURL: ""
  PREVIEW_BASEURL: ${{ github.event_name == 'pull_request' && format('/pr-{0}', github.event.pull_request.number) || '' }}
  # Effective baseurl for the build: PREVIEW_BASEURL on PRs, PROD_BASEURL on main
  BUILD_BASEURL: ${{ github.event_name == 'pull_request' && format('/pr-{0}', github.event.pull_request.number) || '' }}

# Allow only one concurrent deployment per target.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: habkost-net/Gemfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.207.0
        with:
          ruby-version: '3.1' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate images (mermaid diagrams)
        run: |
          npm install
          make
        working-directory: habkost-net
      - name: Build with Jekyll
        run: bundle exec jekyll build --source ./habkost-net --baseurl "$BUILD_BASEURL"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site/
          include-hidden-files: true

  # Check for URL changes against production manifest
  check-urls:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download built site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site/
      - name: Download production manifest
        run: |
          RUN_ID=$(gh run list \
            --workflow prod-backup.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "## URL check" >> "$GITHUB_STEP_SUMMARY"
            echo "_No production manifest found — run the **Production backup** workflow first._" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          gh run download "$RUN_ID" --name prod-manifest --dir prod-manifest
          mv prod-manifest/prod-manifest.txt _prod-manifest.txt
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
      - name: Compare URLs against production manifest
        if: hashFiles('_prod-manifest.txt') != ''
        run: |
          find _site -type f | sed 's|^_site/||' | sort > _new-manifest.txt
          python3 .github/scripts/check-urls.py
      - name: Post URL check as PR comment
        if: github.event_name == 'pull_request' && hashFiles('_url-check-summary.md') != ''
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file _url-check-summary.md --edit-last \
          || gh pr comment ${{ github.event.pull_request.number }} \
            --body-file _url-check-summary.md
        env:
          GH_TOKEN: ${{ github.token }}

  # Deploy staging (main branch — verify before production)
  deploy-staging:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: https://${{ env.STAGING_DOMAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site/
      - name: Deploy via rsync
        run: bash .github/scripts/deploy.sh
        env:
          UPLOAD_SSH_KEY: ${{ secrets.UPLOAD_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
          UPLOAD_USERNAME: ${{ vars.UPLOAD_USERNAME }}
          UPLOAD_HOST: ${{ vars.UPLOAD_HOST }}
          UPLOAD_PATH: ${{ env.STAGING_DOMAIN }}

  # Deploy to production (main branch pushes and manual triggers)
  deploy-production:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    outputs:
      has_files_to_delete: ${{ steps.check-deletions.outputs.has_files_to_delete }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site/
      - name: Deploy via rsync (no delete)
        run: bash .github/scripts/deploy.sh
        env:
          UPLOAD_SSH_KEY: ${{ secrets.UPLOAD_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
          UPLOAD_USERNAME: ${{ vars.UPLOAD_USERNAME }}
          UPLOAD_HOST: ${{ vars.UPLOAD_HOST }}
          UPLOAD_PATH: ${{ env.PRODUCTION_DOMAIN }}
      - name: Show files that would be deleted
        id: check-deletions
        run: |
          deletions=$(bash .github/scripts/deploy.sh 2>&1 | grep '^deleting ' || true)
          echo '## Files that would be deleted from production' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$deletions" ]; then
            echo "$deletions" >> "$GITHUB_STEP_SUMMARY"
            echo 'has_files_to_delete=true' >> "$GITHUB_OUTPUT"
          else
            echo '(none)' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        env:
          UPLOAD_SSH_KEY: ${{ secrets.UPLOAD_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
          UPLOAD_USERNAME: ${{ vars.UPLOAD_USERNAME }}
          UPLOAD_HOST: ${{ vars.UPLOAD_HOST }}
          UPLOAD_PATH: ${{ env.PRODUCTION_DOMAIN }}
          DRY_RUN: "1"
          DELETE: "1"

  # Cleanup production: delete stale files (requires manual approval via environment)
  cleanup-production:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.deploy-production.outputs.has_files_to_delete == 'true'
    needs: deploy-production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site/
      - name: Delete stale files via rsync
        run: bash .github/scripts/deploy.sh
        env:
          UPLOAD_SSH_KEY: ${{ secrets.UPLOAD_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
          UPLOAD_USERNAME: ${{ vars.UPLOAD_USERNAME }}
          UPLOAD_HOST: ${{ vars.UPLOAD_HOST }}
          UPLOAD_PATH: ${{ env.PRODUCTION_DOMAIN }}
          DELETE: "1"

  # Deploy preview (PRs only)
  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site/
      - name: Deploy via rsync
        id: deploy
        run: |
          bash .github/scripts/deploy.sh
          echo "preview_url=https://${{ env.PREVIEW_DOMAIN }}$BUILD_BASEURL" >> "$GITHUB_OUTPUT"
        env:
          UPLOAD_SSH_KEY: ${{ secrets.UPLOAD_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
          UPLOAD_USERNAME: ${{ vars.UPLOAD_USERNAME }}
          UPLOAD_HOST: ${{ vars.UPLOAD_HOST }}
          UPLOAD_PATH: ${{ env.PREVIEW_DOMAIN }}${{ env.BUILD_BASEURL }}
          DELETE: "1"


